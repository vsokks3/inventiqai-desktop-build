name: Build Desktop App

# Trigger manually: pick the app, platform, and version.
on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Application to build'
        required: true
        type: choice
        options:
          - inventiqai-desktop
          - inventiqai-master
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - macos
          - windows
      version:
        description: 'Version to stamp (e.g. 1.0.32)'
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.platform == 'macos' && 'macos-latest' || 'windows-latest' }}

    steps:
      - name: Checkout inventiqai-complete
        uses: actions/checkout@v4
        with:
          repository: vsokks3/inventiqai-complete
          token: ${{ secrets.MONOREPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            inventiqai/package-lock.json
            inventiqai-master/package-lock.json
            inventiqai-desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Rust — macOS (aarch64 + x86_64 for universal binary)
        if: inputs.platform == 'macos'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Rust — Windows
        if: inputs.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.app }}/src-tauri

      # inventiqai-desktop uses inventiqai/ as its frontend (frontendDist: ../../inventiqai/dist)
      - name: Install inventiqai frontend deps
        if: inputs.app == 'inventiqai-desktop'
        run: npm ci
        working-directory: inventiqai

      - name: Install app deps
        run: npm ci
        working-directory: ${{ inputs.app }}

      - name: Patch version in tauri.conf.json
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const path = '${{ inputs.app }}/src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
            cfg.version = '$VERSION';
            fs.writeFileSync(path, JSON.stringify(cfg, null, 2));
            console.log('Patched version to', '$VERSION');
          "

      - name: Build — macOS universal binary
        if: inputs.platform == 'macos'
        run: npm run tauri:build:supabase -- --target universal-apple-darwin
        working-directory: ${{ inputs.app }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build — Windows
        if: inputs.platform == 'windows'
        run: npm run tauri:build:supabase
        working-directory: ${{ inputs.app }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts and generate latest.json
        id: artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ inputs.version }}"
          PLATFORM="${{ inputs.platform }}"
          OUT_DIR="release-artifacts"
          mkdir -p "$OUT_DIR" /tmp/existing-release
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ "$APP" = "inventiqai-desktop" ]; then
            TAG="desktop-v$VERSION"
          else
            TAG="master-v$VERSION"
          fi

          # ── macOS ──────────────────────────────────────────────────────────
          if [ "$PLATFORM" = "macos" ]; then
            BUNDLE_DIR="$APP/src-tauri/target/universal-apple-darwin/release/bundle"

            [ -d "$BUNDLE_DIR/dmg" ]   && cp "$BUNDLE_DIR/dmg"/*.dmg         "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/macos" ] && cp "$BUNDLE_DIR/macos"/*.tar.gz     "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/macos" ] && cp "$BUNDLE_DIR/macos"/*.tar.gz.sig "$OUT_DIR/" 2>/dev/null || true

            SIG_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.tar.gz.sig" | head -1)
            TAR_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.tar.gz"     | head -1)
            [ -z "$SIG_FILE" ] && echo "ERROR: No .tar.gz.sig found — was TAURI_SIGNING_PRIVATE_KEY set?" && exit 1

            PLATFORM_KEY="darwin-universal"
            DOWNLOAD_URL="https://github.com/vsokks3/inventiqai-desktop-build/releases/download/$TAG/$(basename "$TAR_FILE")"

          # ── Windows ────────────────────────────────────────────────────────
          else
            BUNDLE_DIR="$APP/src-tauri/target/release/bundle"

            [ -d "$BUNDLE_DIR/nsis" ] && cp "$BUNDLE_DIR/nsis"/*.exe          "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/nsis" ] && cp "$BUNDLE_DIR/nsis"/*.nsis.zip     "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/nsis" ] && cp "$BUNDLE_DIR/nsis"/*.nsis.zip.sig "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/msi" ]  && cp "$BUNDLE_DIR/msi"/*.msi           "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/msi" ]  && cp "$BUNDLE_DIR/msi"/*.msi.zip       "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/msi" ]  && cp "$BUNDLE_DIR/msi"/*.msi.zip.sig   "$OUT_DIR/" 2>/dev/null || true

            SIG_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.nsis.zip.sig" | head -1)
            ZIP_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.nsis.zip"     | head -1)
            if [ -z "$SIG_FILE" ]; then
              SIG_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.msi.zip.sig" | head -1)
              ZIP_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.msi.zip"     | head -1)
            fi
            [ -z "$SIG_FILE" ] && echo "ERROR: No .sig file found — was TAURI_SIGNING_PRIVATE_KEY set?" && exit 1

            PLATFORM_KEY="windows-x86_64"
            DOWNLOAD_URL="https://github.com/vsokks3/inventiqai-desktop-build/releases/download/$TAG/$(basename "$ZIP_FILE")"
          fi

          # Fetch existing latest.json (other platform may have already uploaded it) and merge
          gh release download "$TAG" \
            --repo "vsokks3/inventiqai-desktop-build" \
            -p "latest.json" -D /tmp/existing-release 2>/dev/null || true

          export PY_VERSION="$VERSION"
          export PY_TAG="$TAG"
          export PY_PUB_DATE="$PUB_DATE"
          export PY_PLATFORM_KEY="$PLATFORM_KEY"
          export PY_SIG_FILE="$SIG_FILE"
          export PY_DOWNLOAD_URL="$DOWNLOAD_URL"
          export PY_OUT_DIR="$OUT_DIR"

          python3 <<'PYEOF'
          import json, os

          existing_path = '/tmp/existing-release/latest.json'
          version      = os.environ["PY_VERSION"]
          tag          = os.environ["PY_TAG"]
          pub_date     = os.environ["PY_PUB_DATE"]
          platform_key = os.environ["PY_PLATFORM_KEY"]
          sig_file     = os.environ["PY_SIG_FILE"]
          download_url = os.environ["PY_DOWNLOAD_URL"]
          out_dir      = os.environ["PY_OUT_DIR"]

          with open(sig_file) as f:
              signature = f.read().strip()

          try:
              with open(existing_path) as f:
                  data = json.load(f)
          except Exception:
              data = {
                  "version": version,
                  "notes": f"See https://github.com/vsokks3/inventiqai-desktop-build/releases/tag/{tag} for release notes.",
                  "pub_date": pub_date,
                  "platforms": {}
              }

          data["version"] = version
          data["pub_date"] = pub_date
          data.setdefault("platforms", {})[platform_key] = {
              "signature": signature,
              "url": download_url
          }

          with open(f"{out_dir}/latest.json", "w") as f:
              json.dump(data, f, indent=2)

          print("--- latest.json ---")
          with open(f"{out_dir}/latest.json") as f:
              print(f.read())
          PYEOF

          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

          echo ""
          echo "--- Artifacts ---"
          ls -lh "$OUT_DIR/"

      - name: Publish to inventiqai-desktop-build
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP="${{ inputs.app }}"
          TAG="${{ steps.artifacts.outputs.TAG }}"
          VERSION="${{ steps.artifacts.outputs.VERSION }}"
          PLATFORM="${{ inputs.platform }}"

          if [ "$APP" = "inventiqai-desktop" ]; then
            TITLE="InventiqAI Desktop v$VERSION"
          else
            TITLE="Master InventiqAI v$VERSION"
          fi

          # Create release if it doesn't exist yet
          if ! gh release view "$TAG" --repo "vsokks3/inventiqai-desktop-build" 2>/dev/null; then
            gh release create "$TAG" \
              --repo "vsokks3/inventiqai-desktop-build" \
              --title "$TITLE" \
              --notes "$TITLE — $PLATFORM build"
          fi

          # Upload artifacts (--clobber overwrites stale latest.json from a previous platform run)
          gh release upload "$TAG" release-artifacts/* \
            --repo "vsokks3/inventiqai-desktop-build" \
            --clobber
