name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Application to build'
        required: true
        type: choice
        options:
          - inventiqai-desktop
          - inventiqai-master
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - macos
          - windows
      version:
        description: 'Version to stamp (e.g. 1.0.32)'
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.platform == 'macos' && 'macos-latest' || 'windows-latest' }}

    steps:
      - name: Checkout inventiqai-desktop
        if: inputs.app == 'inventiqai-desktop'
        uses: actions/checkout@v4
        with:
          repository: vsokks3/inventiqai-desktop
          token: ${{ secrets.MONOREPO_TOKEN }}
          path: inventiqai-desktop

      - name: Checkout inventiqai (shared frontend)
        if: inputs.app == 'inventiqai-desktop'
        uses: actions/checkout@v4
        with:
          repository: vsokks3/inventiqai
          token: ${{ secrets.MONOREPO_TOKEN }}
          path: inventiqai

      - name: Checkout inventiqai-master
        if: inputs.app == 'inventiqai-master'
        uses: actions/checkout@v4
        with:
          repository: vsokks3/inventiqai-master
          token: ${{ secrets.MONOREPO_TOKEN }}
          path: inventiqai-master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (macos - aarch64 + x86_64 for universal binary)
        if: inputs.platform == 'macos'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Rust (windows)
        if: inputs.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.app }}/src-tauri

      - name: Install inventiqai frontend deps
        if: inputs.app == 'inventiqai-desktop'
        run: npm ci
        working-directory: inventiqai

      - name: Install app deps
        run: npm ci
        working-directory: ${{ inputs.app }}

      - name: Patch version in tauri.conf.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = '${{ inputs.app }}/src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            cfg.version = '${{ inputs.version }}';
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2));
            console.log('Patched version to ${{ inputs.version }}');
          "

      - name: Build (macos universal binary)
        if: inputs.platform == 'macos'
        run: npm run tauri:build:supabase -- --target universal-apple-darwin
        working-directory: ${{ inputs.app }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build (windows)
        if: inputs.platform == 'windows'
        run: npm run tauri:build:supabase
        working-directory: ${{ inputs.app }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts and generate latest.json
        id: artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ inputs.version }}"
          PLATFORM="${{ inputs.platform }}"
          OUT_DIR="release-artifacts"
          mkdir -p "$OUT_DIR" /tmp/existing-release
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ "$APP" = "inventiqai-desktop" ]; then
            TAG="desktop-v$VERSION"
          else
            TAG="master-v$VERSION"
          fi

          if [ "$PLATFORM" = "macos" ]; then
            BUNDLE_DIR="$APP/src-tauri/target/universal-apple-darwin/release/bundle"
            [ -d "$BUNDLE_DIR/dmg" ]   && cp "$BUNDLE_DIR/dmg"/*.dmg         "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/macos" ] && cp "$BUNDLE_DIR/macos"/*.tar.gz     "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/macos" ] && cp "$BUNDLE_DIR/macos"/*.tar.gz.sig "$OUT_DIR/" 2>/dev/null || true
            SIG_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.tar.gz.sig" | head -1)
            TAR_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.tar.gz" | head -1)
            [ -z "$SIG_FILE" ] && echo "ERROR: No .tar.gz.sig found" && exit 1
            PLATFORM_KEY="darwin-universal"
            ARTIFACT_FILE="$TAR_FILE"
          else
            BUNDLE_DIR="$APP/src-tauri/target/release/bundle"
            [ -d "$BUNDLE_DIR/nsis" ] && cp "$BUNDLE_DIR/nsis"/*.exe          "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/nsis" ] && cp "$BUNDLE_DIR/nsis"/*.nsis.zip     "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/nsis" ] && cp "$BUNDLE_DIR/nsis"/*.nsis.zip.sig "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/msi" ]  && cp "$BUNDLE_DIR/msi"/*.msi           "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/msi" ]  && cp "$BUNDLE_DIR/msi"/*.msi.zip       "$OUT_DIR/" 2>/dev/null || true
            [ -d "$BUNDLE_DIR/msi" ]  && cp "$BUNDLE_DIR/msi"/*.msi.zip.sig   "$OUT_DIR/" 2>/dev/null || true
            SIG_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.nsis.zip.sig" | head -1)
            ARTIFACT_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.nsis.zip" | head -1)
            if [ -z "$SIG_FILE" ]; then
              SIG_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.msi.zip.sig" | head -1)
              ARTIFACT_FILE=$(find "$OUT_DIR" -maxdepth 1 -name "*.msi.zip" | head -1)
            fi
            [ -z "$SIG_FILE" ] && echo "ERROR: No .sig file found" && exit 1
            PLATFORM_KEY="windows-x86_64"
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          DOWNLOAD_URL="https://github.com/vsokks3/inventiqai-desktop-build/releases/download/$TAG/$(basename "$ARTIFACT_FILE")"

          # Fetch existing latest.json and merge this platform in (so Windows + macOS coexist)
          gh release download "$TAG" \
            --repo "vsokks3/inventiqai-desktop-build" \
            -p "latest.json" -D /tmp/existing-release 2>/dev/null || true

          PLATFORM_ENTRY=$(jq -n \
            --arg sig "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            '{signature: $sig, url: $url}')

          if [ -f /tmp/existing-release/latest.json ]; then
            jq --arg version "$VERSION" \
               --arg pub_date "$PUB_DATE" \
               --arg key "$PLATFORM_KEY" \
               --argjson entry "$PLATFORM_ENTRY" \
               '.version = $version | .pub_date = $pub_date | .platforms[$key] = $entry' \
               /tmp/existing-release/latest.json > "$OUT_DIR/latest.json"
          else
            jq -n \
              --arg version "$VERSION" \
              --arg tag "$TAG" \
              --arg pub_date "$PUB_DATE" \
              --arg key "$PLATFORM_KEY" \
              --argjson entry "$PLATFORM_ENTRY" \
              '{version: $version, notes: ("Release " + $tag), pub_date: $pub_date, platforms: {($key): $entry}}' \
              > "$OUT_DIR/latest.json"
          fi

          echo "--- latest.json ---"
          cat "$OUT_DIR/latest.json"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "--- Artifacts ---"
          ls -lh "$OUT_DIR/"

      - name: Publish to inventiqai-desktop-build
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP="${{ inputs.app }}"
          TAG="${{ steps.artifacts.outputs.TAG }}"
          VERSION="${{ steps.artifacts.outputs.VERSION }}"

          if [ "$APP" = "inventiqai-desktop" ]; then
            TITLE="InventiqAI Desktop v$VERSION"
          else
            TITLE="Master InventiqAI v$VERSION"
          fi

          if ! gh release view "$TAG" --repo "vsokks3/inventiqai-desktop-build" 2>/dev/null; then
            gh release create "$TAG" \
              --repo "vsokks3/inventiqai-desktop-build" \
              --title "$TITLE" \
              --notes "$TITLE - ${{ inputs.platform }} build"
          fi

          gh release upload "$TAG" release-artifacts/* \
            --repo "vsokks3/inventiqai-desktop-build" \
            --clobber
